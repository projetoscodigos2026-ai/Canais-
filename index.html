<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SatIA TV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="channels.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#060810; --surface:#0d1120; --surface2:#131826;
      --border:rgba(255,255,255,0.07); --accent:#00e5ff; --accent2:#7c3aed;
      --text:#e8eaf6; --muted:#6b7280; --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }
    html,body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; overflow-x:hidden; }

    .header { display:flex; align-items:center; justify-content:space-between; padding:16px 18px 12px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:200; }
    .logo { display:flex; align-items:center; gap:8px; }
    .logo-icon { width:34px; height:34px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:18px; }
    .logo-text { font-size:18px; font-weight:700; letter-spacing:-0.5px; background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .header-badge { font-size:11px; color:var(--accent); background:rgba(0,229,255,0.1); border:1px solid rgba(0,229,255,0.2); padding:3px 9px; border-radius:20px; }

    .search-bar { padding:10px 18px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:63px; z-index:190; }
    .search-wrap { display:flex; align-items:center; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:0 12px; gap:8px; }
    .search-wrap span { font-size:15px; color:var(--muted); }
    .search-wrap input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-size:15px; padding:11px 0; font-family:var(--font); }
    .search-wrap input::placeholder { color:var(--muted); }
    .search-clear { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:4px; display:none; }

    .player-section { background:#000; position:relative; }
    #videoPlayer { width:100%; max-height:240px; display:block; background:#000; }
    .player-overlay { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(0,0,0,0.85)); padding:10px 14px 8px; pointer-events:none; }
    .now-playing-label { font-size:10px; color:var(--accent); letter-spacing:1px; text-transform:uppercase; font-weight:600; }
    .now-playing-name { font-size:15px; font-weight:600; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .player-placeholder { width:100%; height:180px; background:var(--surface); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--muted); }
    .player-placeholder .icon { font-size:38px; opacity:0.4; }
    .player-placeholder p { font-size:14px; }

    .ai-banner { display:none; margin:10px 14px; padding:10px 14px; background:rgba(0,229,255,0.06); border:1px solid rgba(0,229,255,0.15); border-radius:10px; font-size:13px; color:var(--text); line-height:1.5; }
    .ai-banner.show { display:flex; gap:10px; align-items:flex-start; }
    .ai-banner .ai-icon { font-size:18px; flex-shrink:0; margin-top:1px; }

    .load-section { padding:10px 14px; display:flex; gap:8px; }
    .btn-load { flex:1; padding:10px; border-radius:10px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:13px; cursor:pointer; font-family:var(--font); display:flex; align-items:center; justify-content:center; gap:6px; }
    .btn-load:active { background:rgba(0,229,255,0.1); }

    .cats-scroll { display:flex; overflow-x:auto; gap:8px; padding:10px 14px; scrollbar-width:none; }
    .cats-scroll::-webkit-scrollbar { display:none; }
    .cat-tab { flex-shrink:0; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:500; border:1px solid var(--border); background:var(--surface2); color:var(--muted); cursor:pointer; white-space:nowrap; transition:all 0.15s; }
    .cat-tab.active { background:linear-gradient(90deg,var(--accent),var(--accent2)); border-color:transparent; color:#fff; font-weight:600; }

    .channels-section { padding:0 14px 100px; }
    .cat-group { margin-bottom:6px; }
    .cat-group-title { font-size:12px; font-weight:600; color:var(--muted); letter-spacing:0.8px; text-transform:uppercase; padding:14px 0 8px; }

    .channel-item { display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:12px; margin-bottom:4px; cursor:pointer; background:var(--surface2); border:1px solid transparent; }
    .channel-item:active { background:rgba(0,229,255,0.07); }
    .channel-item.playing { background:rgba(0,229,255,0.08); border-color:rgba(0,229,255,0.25); }

    .ch-logo { width:36px; height:36px; border-radius:8px; object-fit:contain; background:rgba(255,255,255,0.06); flex-shrink:0; }
    .ch-logo-placeholder { width:36px; height:36px; border-radius:8px; background:rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .ch-info { flex:1; min-width:0; }
    .ch-name { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ch-4k { font-size:10px; font-weight:700; color:var(--accent); background:rgba(0,229,255,0.1); border-radius:4px; padding:1px 5px; flex-shrink:0; }
    .ch-live { font-size:10px; font-weight:700; color:#ff3b5c; background:rgba(255,59,92,0.1); border-radius:4px; padding:1px 5px; flex-shrink:0; }
    .ch-play-btn { width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; }
    .channel-item.playing .ch-play-btn { background:var(--accent); color:#000; }

    .empty-state { display:none; flex-direction:column; align-items:center; padding:50px 20px; color:var(--muted); gap:10px; text-align:center; }
    .empty-state .icon { font-size:36px; opacity:0.3; }

    .loading-bar { padding:14px 18px; display:flex; align-items:center; gap:10px; font-size:13px; color:var(--muted); }
    .spin { animation:spin 1s linear infinite; display:inline-block; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">📺</div>
    <span class="logo-text">SatIA TV</span>
  </div>
  <span class="header-badge">IA • IPTV</span>
</header>

<div class="search-bar">
  <div class="search-wrap">
    <span>🔍</span>
    <input id="searchInput" type="search" placeholder="Buscar canal..." oninput="onSearch(this.value)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="player-section" id="playerSection">
  <div class="player-placeholder" id="playerPlaceholder">
    <div class="icon">📡</div>
    <p>Selecione um canal para assistir</p>
  </div>
  <video id="videoPlayer" controls playsinline style="display:none;" preload="none"></video>
  <div class="player-overlay" id="playerOverlay" style="display:none;">
    <div class="now-playing-label">▶ Reproduzindo</div>
    <div class="now-playing-name" id="nowPlayingName">—</div>
  </div>
</div>

<div class="ai-banner" id="aiBanner">
  <span class="ai-icon">🧠</span>
  <span id="aiText"></span>
</div>

<div class="load-section">
  <button class="btn-load" onclick="loadRemotePlaylist()">🌐 M3U URL</button>
  <button class="btn-load" onclick="loadLocalFile()">📁 Arquivo .m3u</button>
</div>

<div class="cats-scroll" id="catsScroll"></div>

<div id="loadingBar" class="loading-bar" style="display:none;">
  <span class="spin">⏳</span> Carregando canais abertos...
</div>

<div class="channels-section" id="channelsSection">
  <div class="empty-state" id="emptyState">
    <div class="icon">🔎</div>
    <p>Nenhum canal encontrado</p>
  </div>
</div>

<script>
const PROXY = "https://proxy-iptv.projetoscodigos2026.workers.dev/?url=";

// Fontes de canais abertos brasileiros (iptv-org - atualizado diariamente)
const OPEN_SOURCES = [
  "https://iptv-org.github.io/iptv/countries/bra.m3u",
  "https://iptv-org.github.io/iptv/languages/por.m3u"
];

let currentHls    = null;
let currentUrl    = '';
let currentCat    = 'abertos';
let openChannels  = [];
let externalChannels = [];

// ── INIT ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildCategoryTabs();
  renderChannels('abertos');
  loadOpenChannels();
});

// ── TABS ──────────────────────────────────────────
function buildCategoryTabs() {
  const scroll = document.getElementById('catsScroll');

  const tabs = [
    { id:'abertos',        label:'📡 Abertos' },
    { id:'esportes',       label:'⚽ Esportes' },
    { id:'filmes',         label:'🎬 Filmes' },
    { id:'noticias',       label:'📰 Notícias' },
    { id:'entretenimento', label:'🎭 Entretenimento' },
    { id:'documentario',   label:'🔬 Documentário' },
    { id:'infantil',       label:'🧒 Infantil' },
    { id:'religioso',      label:'✝️ Religioso' },
    { id:'externos',       label:'📥 Importados' },
  ];

  tabs.forEach((t, i) => {
    const btn = document.createElement('div');
    btn.className = 'cat-tab' + (i === 0 ? ' active' : '');
    btn.dataset.cat = t.id;
    btn.textContent = t.label;
    if (t.id === 'externos') { btn.id = 'tabExternos'; btn.style.display = 'none'; }
    btn.onclick = () => selectCat(t.id);
    scroll.appendChild(btn);
  });
}

function selectCat(id) {
  currentCat = id;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === id));
  clearSearch();
  renderChannels(id);
}

// ── CANAIS ABERTOS (iptv-org) ─────────────────────
async function loadOpenChannels() {
  document.getElementById('loadingBar').style.display = 'flex';
  openChannels = [];

  for (const src of OPEN_SOURCES) {
    try {
      const res  = await fetch(PROXY + encodeURIComponent(src));
      const text = await res.text();
      const parsed = parseM3UText(text, true);
      // Evita duplicatas pelo nome
      parsed.forEach(ch => {
        if (!openChannels.find(x => x.name.toLowerCase() === ch.name.toLowerCase())) {
          openChannels.push(ch);
        }
      });
    } catch(e) { console.warn('Erro ao carregar', src, e); }
  }

  document.getElementById('loadingBar').style.display = 'none';

  if (currentCat === 'abertos') renderChannels('abertos');

  showAiMsg(`✅ ${openChannels.length} canais abertos carregados e atualizados!`);
}

// ── RENDER ────────────────────────────────────────
function renderChannels(catId, searchTerm) {
  const section = document.getElementById('channelsSection');
  const empty   = document.getElementById('emptyState');
  // Limpa mantendo o empty state
  Array.from(section.children).forEach(c => { if (c !== empty) c.remove(); });
  empty.style.display = 'none';

  let groups = [];

  if (searchTerm) {
    const term = searchTerm.toLowerCase();
    const all  = getAllFlat();
    const found = all.filter(c => c.name.toLowerCase().includes(term));
    if (!found.length) { empty.style.display = 'flex'; return; }
    groups = [{ label: `${found.length} resultado(s)`, channels: found }];

  } else if (catId === 'abertos') {
    if (!openChannels.length) {
      groups = [{ label: '📡 Canais Abertos', channels: [] }];
    } else {
      groups = [{ label: `📡 Canais Abertos (${openChannels.length})`, channels: openChannels }];
    }

  } else if (catId === 'externos') {
    if (!externalChannels.length) { empty.style.display = 'flex'; return; }
    groups = [{ label: '📥 Importados', channels: externalChannels }];

  } else {
    const cat = CHANNEL_CATEGORIES.find(c => c.id === catId);
    if (!cat) { empty.style.display = 'flex'; return; }
    groups = [{ label: cat.label, channels: cat.channels }];
  }

  groups.forEach(group => {
    if (!group.channels.length) {
      const msg = document.createElement('div');
      msg.className = 'loading-bar';
      msg.innerHTML = '<span class="spin">⏳</span> Aguardando canais...';
      section.appendChild(msg);
      return;
    }
    const wrapper = document.createElement('div');
    wrapper.className = 'cat-group';
    const title = document.createElement('div');
    title.className = 'cat-group-title';
    title.textContent = group.label;
    wrapper.appendChild(title);
    group.channels.forEach(ch => wrapper.appendChild(makeChannelItem(ch)));
    section.appendChild(wrapper);
  });
}

function getAllFlat() {
  let all = [...openChannels];
  CHANNEL_CATEGORIES.forEach(cat => all.push(...cat.channels));
  all.push(...externalChannels);
  return all;
}

function makeChannelItem(ch) {
  const is4k  = ch.name.includes('4K') || ch.name.includes('4k');
  const isLive = ch.isLive;
  const item  = document.createElement('div');
  item.className = 'channel-item' + (ch.url === currentUrl ? ' playing' : '');
  item.onclick   = () => playChannel(ch);

  let logoEl;
  if (ch.logo) {
    logoEl = document.createElement('img');
    logoEl.className = 'ch-logo';
    logoEl.src = ch.logo;
    logoEl.alt = ch.name;
    logoEl.onerror = () => logoEl.replaceWith(makeLogoPlaceholder(ch.name));
  } else {
    logoEl = makeLogoPlaceholder(ch.name);
  }

  const info = document.createElement('div');
  info.className = 'ch-info';
  const name = document.createElement('div');
  name.className = 'ch-name';
  name.textContent = ch.name;
  info.appendChild(name);

  const playBtn = document.createElement('div');
  playBtn.className = 'ch-play-btn';
  playBtn.textContent = ch.url === currentUrl ? '⏸' : '▶';

  item.appendChild(logoEl);
  item.appendChild(info);
  if (is4k) {
    const b = document.createElement('span');
    b.className = 'ch-4k'; b.textContent = '4K';
    item.appendChild(b);
  }
  if (isLive) {
    const b = document.createElement('span');
    b.className = 'ch-live'; b.textContent = '🔴 AO VIVO';
    item.appendChild(b);
  }
  item.appendChild(playBtn);
  return item;
}

function makeLogoPlaceholder(name) {
  const el = document.createElement('div');
  el.className = 'ch-logo-placeholder';
  el.textContent = (name || '?').charAt(0).toUpperCase();
  return el;
}

// ── PLAYER ────────────────────────────────────────
function playChannel(ch) {
  currentUrl = ch.url;

  document.getElementById('playerPlaceholder').style.display = 'none';
  document.getElementById('playerOverlay').style.display     = 'block';
  document.getElementById('nowPlayingName').textContent       = ch.name;

  const video = document.getElementById('videoPlayer');
  video.style.display = 'block';

  if (currentHls) { currentHls.destroy(); currentHls = null; }

  const url = ch.url;

  if (Hls.isSupported() && (url.includes('.m3u8') || !url.includes('.ts'))) {
    currentHls = new Hls({ enableWorker:true, lowLatencyMode:true });
    currentHls.loadSource(url);
    currentHls.attachMedia(video);
    currentHls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
    currentHls.on(Hls.Events.ERROR, (_, d) => { if (d.fatal) showAiMsg(`⚠️ ${ch.name} não respondeu. Tente outro canal.`); });
  } else if (video.canPlayType('application/vnd.apple.mpegurl') && url.includes('.m3u8')) {
    video.src = url; video.play().catch(()=>{});
  } else {
    video.src = url; video.play().catch(()=>{});
  }

  showAiMsg(`<b>${ch.name}</b> — ${url.includes('.ts') ? 'MPEG-TS' : 'HLS'} ${(ch.name.includes('4K')||ch.name.includes('4k')) ? '· <span style="color:var(--accent)">4K</span>' : ''}<br><span style="color:var(--muted);font-size:12px;">via proxy seguro ✓</span>`);

  document.querySelectorAll('.channel-item').forEach(el => {
    el.classList.remove('playing');
    const n = el.querySelector('.ch-name');
    if (n && n.textContent === ch.name) {
      el.classList.add('playing');
      const b = el.querySelector('.ch-play-btn');
      if (b) b.textContent = '⏸';
    }
  });
}

function showAiMsg(html) {
  const banner = document.getElementById('aiBanner');
  document.getElementById('aiText').innerHTML = html;
  banner.classList.add('show');
}

// ── BUSCA ─────────────────────────────────────────
function onSearch(val) {
  document.getElementById('searchClear').style.display = val ? 'block' : 'none';
  val ? renderChannels(null, val) : renderChannels(currentCat);
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  renderChannels(currentCat);
}

// ── PLAYLIST EXTERNA ──────────────────────────────
function loadRemotePlaylist() {
  const url = prompt('Cole a URL da playlist M3U:');
  if (!url) return;
  fetchAndParse(url);
}
function loadLocalFile() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.m3u,.m3u8';
  input.onchange = e => {
    const r = new FileReader();
    r.onload = ev => { externalChannels = parseM3UText(ev.target.result, false); showExternal(); };
    r.readAsText(e.target.files[0]);
  };
  input.click();
}
async function fetchAndParse(url) {
  showAiMsg('⏳ Carregando playlist...');
  try {
    const res  = await fetch(PROXY + encodeURIComponent(url));
    const text = await res.text();
    externalChannels = parseM3UText(text, false);
    showExternal();
  } catch { showAiMsg('⚠️ Não foi possível carregar a URL.'); }
}
function showExternal() {
  const t = document.getElementById('tabExternos');
  if (t) t.style.display = 'block';
  selectCat('externos');
  showAiMsg(`✅ ${externalChannels.length} canais importados!`);
}

// ── PARSER M3U ────────────────────────────────────
function parseM3UText(data, wrapProxy) {
  const result = [];
  const lines  = data.split('\n');
  let current  = {};
  for (const raw of lines) {
    const line = raw.trim();
    if (line.startsWith('#EXTINF:')) {
      const logoMatch  = line.match(/tvg-logo="([^"]+)"/);
      const groupMatch = line.match(/group-title="([^"]+)"/);
      const name = line.split(',').pop().trim();
      current = {
        name,
        logo:  logoMatch  ? logoMatch[1]  : '',
        group: groupMatch ? groupMatch[1] : '',
        isLive: true
      };
    } else if (line && !line.startsWith('#') && current.name) {
      let url = line;
      if (wrapProxy && url.startsWith('http://')) {
        url = PROXY + encodeURIComponent(url);
      }
      current.url = url;
      result.push({ ...current });
      current = {};
    }
  }
  return result;
}
</script>
</body>
</html>
